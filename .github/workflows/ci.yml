name: Swift CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        swift build --target PrivacyGuard \
          -Xswiftc "-target" -Xswiftc "arm64-apple-ios18.0-simulator" \
          -Xswiftc "-sdk" -Xswiftc "$(xcrun --sdk iphonesimulator --show-sdk-path)"
    - name: Test
      run: |
        swift test --target PrivacyGuard \
          -Xswiftc "-target" -Xswiftc "arm64-apple-ios18.0-simulator" \
          -Xswiftc "-sdk" -Xswiftc "$(xcrun --sdk iphonesimulator --show-sdk-path)"
