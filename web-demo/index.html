<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivacyGuard - Live Demo</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #007AFF; font-size: 42px; margin: 0; }
        .header p { color: #888; margin: 8px 0 0; }
        .env-banner {
            max-width: 420px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #ccc;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }
        .env-banner.ok { border-color: #0A0; color: #6f6; }
        .env-banner.warn { border-color: #FFA500; color: #FFA500; }
        .phone-frame {
            width: 380px;
            height: 720px;
            background: #111;
            border-radius: 60px;
            padding: 12px;
            box-shadow: 0 0 60px rgba(0, 122, 255, 0.4), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative;
        }
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 20px;
            z-index: 10;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 48px;
            overflow: hidden;
            position: relative;
        }
        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a1a;
            display: block;
        }
        .sim-bg {
            position: absolute; inset: 0;
            background:
                radial-gradient(circle at 30% 35%, rgba(255,200,160,0.25), transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(100,150,255,0.15), transparent 50%),
                linear-gradient(135deg, #1c1c20, #0a0a0e);
            display: none;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .sim-bg.show { display: flex; }
        .sim-face {
            width: 140px; height: 180px;
            border-radius: 50%;
            background: radial-gradient(ellipse at 50% 40%, #c9a187, #6e4a37 70%, #2a1a14);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            opacity: 0.85;
        }
        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            transition: all 0.2s ease;
        }
        .shield-active {
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .shield-active::after {
            content: '🔒  Screen Shielded';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
        }
        .face-overlay {
            position: absolute;
            border: 3px solid #00FF9F;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 20px #00FF9F;
            transition: all 0.1s ease;
        }
        .face-overlay.intruder {
            border-color: #FF3B30;
            box-shadow: 0 0 22px #FF3B30;
        }
        .stats {
            margin-top: 20px;
            background: #111;
            border-radius: 16px;
            padding: 18px 20px;
            width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 15px;
        }
        .stat-label { color: #888; }
        .stat-value { color: #007AFF; font-weight: 600; }
        .controls {
            margin-top: 18px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 420px;
        }
        button {
            padding: 14px 22px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover { background: #0055CC; transform: translateY(-1px); }
        button.secondary { background: #333; }
        button.secondary:hover { background: #444; }
        .status-bar {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            height: 26px;
            background: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 5;
            color: #0A0;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
            border: 1px solid #222;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PrivacyGuard</h1>
        <p><strong>Your screen. Yours alone.</strong> — Live Demo</p>
    </div>

    <div id="env-banner" class="env-banner">Checking environment…</div>

    <div class="phone-frame">
        <div class="screen">
            <video id="camera" autoplay playsinline muted></video>
            <div id="sim-bg" class="sim-bg">
                <div class="sim-face"></div>
            </div>
            <div id="overlay" class="overlay"></div>
            <div class="status-bar">🔒 PrivacyGuard Active</div>
            <div id="face-indicators"></div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-row"><span class="stat-label">Faces Detected</span> <span id="face-count" class="stat-value">1</span></div>
        <div class="stat-row"><span class="stat-label">Response Time</span> <span id="latency" class="stat-value"><120ms</span></div>
        <div class="stat-row"><span class="stat-label">Shield Status</span> <span id="shield-status" class="stat-value" style="color:#0A0">Inactive</span></div>
        <div class="stat-row"><span class="stat-label">Power Impact</span> <span id="power" class="stat-value">0.8%</span></div>
    </div>

    <div class="controls">
        <button onclick="startCamera()">📷 Start Camera</button>
        <button onclick="simulateSecondFace()">👥 Simulate Second Face</button>
        <button onclick="resetDemo()" class="secondary">Reset</button>
    </div>

    <script>
        let videoStream = null;
        let secondFaceActive = false;
        let usingSimulation = false;

        // --- Environment check on load ---
        function checkEnvironment() {
            const banner = document.getElementById('env-banner');
            const isSecure = window.isSecureContext;
            const inIframe = window.self !== window.top;
            const hasMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

            if (!hasMedia) {
                banner.className = 'env-banner warn';
                banner.innerHTML = '⚠️ This browser does not expose <code>getUserMedia</code>. Demo will use simulation.';
            } else if (!isSecure) {
                banner.className = 'env-banner warn';
                banner.innerHTML = '⚠️ Insecure context — camera blocked. Open via <code>https://</code> or <code>localhost</code>.';
            } else if (inIframe) {
                banner.className = 'env-banner warn';
                banner.innerHTML = '⚠️ Running inside a sandboxed frame. Camera may be blocked by the host. Open this file directly to use the live camera.';
            } else {
                banner.className = 'env-banner ok';
                banner.textContent = '✅ Environment OK — tap Start Camera to enable live view';
            }
        }

        async function startCamera() {
            const video = document.getElementById('camera');
            const simBg = document.getElementById('sim-bg');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                toast('Camera API unavailable — using simulation');
                useSimulation();
                return;
            }

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: false
                });
                video.srcObject = videoStream;
                video.style.display = 'block';
                simBg.classList.remove('show');
                usingSimulation = false;
                toast('✅ Camera active — TrueDepth simulation running');
                addFaceOverlay(120, 200, 100, false);
            } catch (err) {
                console.error('Camera error:', err);
                let reason = err.name || 'Unknown error';
                let hint = '';
                if (err.name === 'NotAllowedError') hint = 'Permission denied. Check your browser/site camera permissions.';
                else if (err.name === 'NotFoundError') hint = 'No camera found on this device.';
                else if (err.name === 'NotReadableError') hint = 'Camera is in use by another app.';
                else if (err.name === 'SecurityError') hint = 'Blocked by security policy (likely sandboxed iframe — open file directly).';
                else hint = err.message || '';
                toast(`Camera blocked: ${reason}. ${hint}`);
                useSimulation();
            }
        }

        function useSimulation() {
            usingSimulation = true;
            const video = document.getElementById('camera');
            const simBg = document.getElementById('sim-bg');
            video.style.display = 'none';
            simBg.classList.add('show');
            addFaceOverlay(120, 200, 100, false);
        }

        function addFaceOverlay(x, y, size, intruder) {
            const container = document.getElementById('face-indicators');
            const overlay = document.createElement('div');
            overlay.className = 'face-overlay' + (intruder ? ' intruder' : '');
            overlay.style.left = x + 'px';
            overlay.style.top = y + 'px';
            overlay.style.width = size + 'px';
            overlay.style.height = size + 'px';
            overlay.dataset.role = intruder ? 'intruder' : 'owner';
            container.appendChild(overlay);
            return overlay;
        }

        function clearOverlays(role) {
            const container = document.getElementById('face-indicators');
            [...container.children].forEach(el => {
                if (!role || el.dataset.role === role) el.remove();
            });
        }

        function simulateSecondFace() {
            const overlay = document.getElementById('overlay');
            const status = document.getElementById('shield-status');
            const faceCountEl = document.getElementById('face-count');
            const latencyEl = document.getElementById('latency');

            if (secondFaceActive) {
                secondFaceActive = false;
                faceCountEl.textContent = '1';
                overlay.classList.remove('shield-active');
                status.textContent = 'Inactive';
                status.style.color = '#0A0';
                clearOverlays('intruder');
                toast('✅ Second face left — screen restored');
                return;
            }

            secondFaceActive = true;
            faceCountEl.textContent = '2';
            latencyEl.textContent = '87ms';
            overlay.classList.add('shield-active');
            status.textContent = 'ACTIVE';
            status.style.color = '#FF3B30';
            addFaceOverlay(230, 320, 80, true);
            toast('⚠️ Second face detected — shielding screen');
        }

        function toast(msg) {
            const el = document.createElement('div');
            el.className = 'toast';
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2400);
        }

        function resetDemo() {
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            location.reload();
        }

        window.addEventListener('load', checkEnvironment);
    </script>
</body>
</html>
